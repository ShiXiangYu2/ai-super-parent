version: "3.9"

services:
  ai-super-parent:
    build: .
    container_name: ai-super-parent
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=gpt-4o-mini
      - CORS_ORIGINS=*
      - DB_PATH=/data/app.db
    volumes:
      - super_parent_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  super_parent_data:
