{% extends "base.html" %}
{% block title %}成长报告{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">成长报告</h2>
<div id="reports-content"></div>
<script>
async function loadReports() {
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');
    const children = await apiFetch('/api/v1/my/children');
    if (!children) return;

    let html = '<div class="mb-4">';
    html += '<select id="student-select" onchange="switchStudent(this.value)" class="border rounded px-3 py-2">';
    children.children.forEach(c => {
        const selected = c.id === studentId ? 'selected' : '';
        html += `<option value="${c.id}" ${selected}>${c.name}</option>`;
    });
    html += '</select></div>';

    const targetId = studentId || (children.children[0] && children.children[0].id);
    if (!targetId) { html += '<p>暂无孩子数据</p>'; document.getElementById('reports-content').innerHTML = html; return; }

    const reportsData = await apiFetch('/api/v1/reports/' + targetId);
    const reports = reportsData ? reportsData.reports : [];

    if (reports.length === 0) {
        html += '<p class="text-gray-500 mb-4">暂无报告</p>';
        html += `<button onclick="generateReport('${targetId}')" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700">生成本月报告</button>`;
    } else {
        html += `<button onclick="generateReport('${targetId}')" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 mb-4">生成新报告</button>`;
        reports.forEach(r => {
            html += '<div class="bg-white p-6 rounded-lg shadow-sm border mb-4">';
            html += '<div class="flex justify-between items-center mb-4"><h3 class="text-lg font-semibold">' + r.month + ' 月度报告</h3></div>';
            if (r.dimensions && r.dimensions.length > 0) {
                html += '<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">';
                r.dimensions.forEach(d => {
                    const pct = (d.score / 10 * 100);
                    html += '<div class="text-center"><div class="text-sm text-gray-600">' + d.name + '</div><div class="text-2xl font-bold text-primary-600">' + d.score + '</div><div class="w-full bg-gray-200 rounded-full h-2 mt-1"><div class="bg-primary-500 h-2 rounded-full" style="width:' + pct + '%"></div></div></div>';
                });
                html += '</div>';
            }
            html += '<div class="text-sm text-gray-700 mb-2"><span class="font-semibold">综合评语:</span> ' + r.summary + '</div>';
            if (r.suggestions) html += '<div class="text-sm text-gray-700"><span class="font-semibold">改善建议:</span> ' + r.suggestions + '</div>';
            html += '</div>';
        });
    }
    document.getElementById('reports-content').innerHTML = html;
}

async function switchStudent(id) { window.location.href = '/app/reports?student=' + id; }

async function generateReport(id) {
    const btn = event.target; btn.disabled = true; btn.textContent = '生成中...';
    const data = await apiFetch('/api/v1/reports/generate', { method: 'POST', body: JSON.stringify({ student_id: id }) });
    btn.disabled = false; btn.textContent = '生成新报告';
    if (data) loadReports();
}

loadReports();
</script>
{% endblock %}
