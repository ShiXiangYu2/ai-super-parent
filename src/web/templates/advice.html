{% extends "base.html" %}
{% block title %}育儿问答{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">AI 育儿问答</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="md:col-span-1">
        <div class="bg-white p-4 rounded-lg shadow-sm border mb-4">
            <h3 class="font-semibold mb-3">选择孩子</h3>
            <div id="children-select"></div>
        </div>
    </div>
    <div class="md:col-span-2">
        <div class="bg-white p-4 rounded-lg shadow-sm border mb-4">
            <textarea id="question-input" rows="3" class="w-full border rounded-lg px-3 py-2" placeholder="输入你的育儿问题..."></textarea>
            <button onclick="askAdvice()" class="mt-2 bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700">
                向 AI 提问
            </button>
        </div>
        <div id="advice-answer" class="hidden bg-blue-50 p-4 rounded-lg border border-blue-200 mb-4"></div>
        <div id="history-list"></div>
    </div>
</div>
<script>
let selectedStudent = null;

async function loadChildren() {
    const data = await apiFetch('/api/v1/my/children');
    if (!data) return;
    const sel = document.getElementById('children-select');
    sel.innerHTML = data.children.map(c => `
        <label class="block mb-2">
            <input type="radio" name="student" value="${c.id}" onchange="selectedStudent='${c.id}'" class="mr-2">
            ${c.name}
        </label>
    `).join('');
    if (data.children.length > 0) {
        sel.querySelector('input').checked = true;
        selectedStudent = data.children[0].id;
    }
    loadHistory();
}

async function askAdvice() {
    if (!selectedStudent) { alert('请先选择一个孩子'); return; }
    const q = document.getElementById('question-input').value;
    if (!q.trim()) { alert('请输入问题'); return; }
    const data = await apiFetch('/api/v1/advice', {
        method: 'POST',
        body: JSON.stringify({ student_id: selectedStudent, question: q })
    });
    if (!data) return;
    const el = document.getElementById('advice-answer');
    el.classList.remove('hidden');
    el.innerHTML = '<div class="font-semibold mb-2">AI 回答:</div><div class="text-gray-700 whitespace-pre-line">' + data.answer + '</div>';
    document.getElementById('question-input').value = '';
    loadHistory();
}

async function loadHistory() {
    if (!selectedStudent) return;
    const data = await apiFetch('/api/v1/my/advice');
    if (!data) return;
    const el = document.getElementById('history-list');
    const records = data.records.filter(r => r.student_id === selectedStudent).slice(0, 10);
    el.innerHTML = '<h3 class="font-semibold mb-3">历史问答</h3>' +
        (records.length === 0 ? '<p class="text-gray-500 text-sm">暂无记录</p>' :
        records.map(r => `
            <div class="bg-white p-3 rounded border mb-2 text-sm">
                <div class="text-gray-500 mb-1">问: ${r.question}</div>
                <div class="text-gray-700">答: ${r.answer.substring(0, 100)}${r.answer.length > 100 ? '...' : ''}</div>
            </div>
        `).join(''));
}

loadChildren();
</script>
{% endblock %}
