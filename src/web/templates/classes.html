{% extends "base.html" %}
{% block title %}班级管理{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">班级管理</h2>
<button onclick="showAddClass()" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 mb-4">+ 新建班级</button>
<div id="classes-list"></div>
<script>
async function loadClasses() {
    const data = await apiFetch('/api/v1/classes');
    if (!data) return;
    document.getElementById('classes-list').innerHTML = data.classes.map(c => `
        <div class="bg-white p-4 rounded-lg shadow-sm border mb-3">
            <div class="flex justify-between items-center">
                <div>
                    <span class="font-semibold">${c.name}</span>
                    <span class="text-sm text-gray-500 ml-2">${c.grade || '-'}</span>
                </div>
                <div class="text-sm text-gray-500">教师: ${c.teacher_ids ? c.teacher_ids.length : 0} 人</div>
            </div>
        </div>
    `).join('');
}

function showAddClass() {
    const name = prompt('输入班级名称:');
    if (!name) return;
    const grade = prompt('输入年级:') || '';
    apiFetch('/api/v1/classes', {
        method: 'POST',
        body: JSON.stringify({ name, grade })
    }).then(() => loadClasses());
}

loadClasses();
</script>
{% endblock %}
