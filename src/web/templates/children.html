{% extends "base.html" %}
{% block title %}我的孩子{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">我的孩子</h2>
<div id="children-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
<script>
async function loadChildren() {
    const data = await apiFetch('/api/v1/my/children');
    if (!data) return;
    document.getElementById('children-list').innerHTML = data.children.map(c => `
        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <div class="text-lg font-semibold">${c.name}</div>
            <div class="text-sm text-gray-500 mt-1">${c.gender === 'male' ? '男' : '女'} | ${c.birth_date || '未知'}</div>
            <div class="text-sm text-gray-500">${c.report_count || 0} 份成长报告</div>
            <div class="mt-3 space-x-2">
                <a href="/app/advice?student=${c.id}" class="text-primary-600 text-sm hover:underline">育儿问答</a>
                <a href="/app/reports?student=${c.id}" class="text-primary-600 text-sm hover:underline">查看报告</a>
            </div>
        </div>
    `).join('');
}
loadChildren();
</script>
{% endblock %}
