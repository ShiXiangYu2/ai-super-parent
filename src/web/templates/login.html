{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white p-8 rounded-lg shadow-sm border">
        <h2 class="text-2xl font-bold text-center mb-6">登录</h2>
        <div id="login-error" class="hidden bg-red-50 text-red-600 p-3 rounded mb-4 text-sm"></div>
        <form id="login-form" onsubmit="return doLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">租户 ID</label>
                <input type="text" id="tenant-id" class="w-full border rounded-lg px-3 py-2" placeholder="留空则自动匹配">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="email" value="parent@demo.com" class="w-full border rounded-lg px-3 py-2" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" value="parent123" class="w-full border rounded-lg px-3 py-2" required>
            </div>
            <button type="submit" class="w-full bg-primary-600 text-white py-2 rounded-lg hover:bg-primary-700 font-medium">
                登录
            </button>
        </form>
        <div class="mt-6 text-xs text-gray-400">
            <p>园长: admin@demo.com / admin123</p>
            <p>教师: teacher@demo.com / teacher123</p>
            <p>家长: parent@demo.com / parent123</p>
        </div>
    </div>
</div>
<script>
async function doLogin(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');
    try {
        const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                tenant_id: document.getElementById('tenant-id').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.detail; errEl.classList.remove('hidden'); return; }
        localStorage.setItem('token', data.token);
        window.location.href = '/app/dashboard';
    } catch(e) { errEl.textContent = '网络错误'; errEl.classList.remove('hidden'); }
}
</script>
{% endblock %}
