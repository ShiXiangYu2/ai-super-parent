name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E402,W503

      - name: Run unit + integration tests
        run: |
          pytest tests/unit/ tests/integration/ --cov=src --cov-report=term --cov-fail-under=80

      - name: Run eval tests (mock)
        run: |
          pytest tests/eval/ -v
